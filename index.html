<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初识5G通信 · AI学习助手</title>
  <style>
    /* ═══════════════════════════ 5G DESIGN SYSTEM ═══════════════════════════ */
    :root {
      /* 5G Color Palette — Tech Blue / Neon Cyan */
      --primary: #0077B6;
      --primary-glow: #00E5FF;
      --primary-bright: #00B4D8;
      --accent: #0096C7;
      --accent-light: #48CAE4;

      --bg: #060B14;
      --bg-card: #0E1A2B;
      --bg-card-alt: #121F33;
      --bg-hover: #152238;

      --text: #E0EFFF;
      --text-secondary: #7B9CC2;
      --text-muted: #4A6280;

      --border: #1E3350;
      --border-focus: #00E5FF;
      --border-glow: rgba(0, 229, 255, 0.5);

      --success: #00E5A0;
      --error: #FF4D6A;

      /* Gradients */
      --gradient-5g: linear-gradient(135deg, #0077B6 0%, #00B4D8 40%, #00E5FF 100%);
      --gradient-header: linear-gradient(180deg, rgba(0,119,182,0.12) 0%, rgba(0,0,0,0) 100%);
      --gradient-bg: linear-gradient(180deg, #060B14 0%, #0A1628 50%, #0E1A2B 100%);
      --gradient-glow: radial-gradient(ellipse at top, rgba(0,229,255,0.08) 0%, transparent 60%);

      /* Shadows */
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 40px rgba(0,119,182,0.2);
      --shadow-glow: 0 0 20px rgba(0,229,255,0.2), 0 0 0 1px rgba(0,229,255,0.15);

      /* Radius */
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;

      /* Transitions */
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: 150ms var(--ease-smooth);
      --transition: 250ms var(--ease-smooth);
      --transition-slow: 400ms var(--ease-smooth);
    }

    /* ═══════════════════════════ RESET & BASE ═══════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════ 5G NETWORK BACKGROUND ══════════════════════════ */
    .bg-network {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(0,119,182,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(0,180,216,0.03) 0%, transparent 40%);
    }

    /* Hex grid lines */
    .bg-network::before {
      content: '';
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(rgba(30,51,80,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,51,80,0.3) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    /* Signal nodes (floating data points) */
    .signal-node {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--primary-glow);
      box-shadow: 0 0 8px var(--primary-glow), 0 0 16px rgba(0,229,255,0.4);
      animation: nodePulse linear infinite;
    }

    .signal-node:nth-child(1) { top: 15%; left: 10%; animation-duration: 4s; animation-delay: 0s; }
    .signal-node:nth-child(2) { top: 25%; right: 15%; animation-duration: 5s; animation-delay: -1s; }
    .signal-node:nth-child(3) { top: 50%; left: 20%; animation-duration: 4.5s; animation-delay: -2s; }
    .signal-node:nth-child(4) { top: 60%; right: 10%; animation-duration: 3.5s; animation-delay: -0.5s; }
    .signal-node:nth-child(5) { top: 75%; left: 60%; animation-duration: 5.5s; animation-delay: -3s; }
    .signal-node:nth-child(6) { top: 35%; left: 75%; animation-duration: 4.2s; animation-delay: -1.5s; }
    .signal-node:nth-child(7) { top: 85%; left: 35%; animation-duration: 3.8s; animation-delay: -2.5s; }
    .signal-node:nth-child(8) { top: 10%; left: 45%; animation-duration: 6s; animation-delay: -4s; }

    @keyframes nodePulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* Signal wave rings emanating from corners */
    .signal-wave {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,229,255,0.15);
      animation: waveExpand linear infinite;
    }

    .signal-wave:nth-child(9) {
      width: 60px; height: 60px;
      top: 80px; right: 80px;
      animation-duration: 6s; animation-delay: 0s;
    }
    .signal-wave:nth-child(10) {
      width: 60px; height: 60px;
      top: 80px; right: 80px;
      animation-duration: 6s; animation-delay: -2s;
    }
    .signal-wave:nth-child(11) {
      width: 60px; height: 60px;
      top: 80px; right: 80px;
      animation-duration: 6s; animation-delay: -4s;
    }

    @keyframes waveExpand {
      0% { transform: scale(0.5); opacity: 0.6; }
      100% { transform: scale(4); opacity: 0; }
    }

    /* ═══════════════════════════ APP CONTAINER ═══════════════════════════ */
    #app-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* ═══════════════════════════ HEADER ═══════════════════════════ */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: rgba(14,26,43,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }

    #header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 5%;
      width: 90%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-glow), transparent);
      opacity: 0.3;
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--gradient-5g);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,229,255,0.3);
      overflow: hidden;
      position: relative;
    }

    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-avatar .avatar-fallback {
      font-size: 20px;
      color: #fff;
      line-height: 1;
      font-weight: 700;
    }

    /* Signal bars animation on avatar */
    .header-avatar::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 14px;
      border: 1.5px solid transparent;
      background: linear-gradient(135deg, var(--primary-glow), transparent, var(--primary-glow)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: rotateBorder 4s linear infinite;
    }

    @keyframes rotateBorder {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .header-info { flex: 1; }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: 1px;
    }

    .header-title .subtitle-tag {
      font-size: 10px;
      font-weight: 500;
      color: var(--primary-glow);
      background: rgba(0,229,255,0.1);
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 8px;
      letter-spacing: 0.5px;
      vertical-align: middle;
      border: 1px solid rgba(0,229,255,0.2);
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      box-shadow: 0 0 6px var(--success);
      animation: statusPulse 2s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px var(--success); }
      50% { opacity: 0.5; transform: scale(0.8); box-shadow: 0 0 10px var(--success); }
    }

    .header-actions { display: flex; gap: 4px; }

    .btn-icon {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: var(--transition-fast);
    }

    .btn-icon:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-color: var(--border-focus);
      box-shadow: 0 0 8px rgba(0,229,255,0.15);
    }

    /* ═══════════════════════════ MESSAGES AREA ═══════════════════════════ */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 100px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
      background: linear-gradient(180deg, rgba(6,11,20,0.3) 0%, rgba(10,22,40,0.2) 100%);
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
    }
    #messages::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ═══════════════════════ WELCOME SCREEN ═══════════════════════ */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      gap: 20px;
      padding: 40px 20px;
      animation: fadeInUp 0.6s var(--ease-smooth);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .welcome-illustration {
      width: 110px;
      height: 110px;
      border-radius: 30px;
      background: var(--gradient-5g);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0,229,255,0.25), 0 0 80px rgba(0,119,182,0.15);
      overflow: hidden;
      animation: floatWelcome 3.5s ease-in-out infinite;
      position: relative;
    }

    .welcome-illustration img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes floatWelcome {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Signal bars around illustration */
    .welcome-illustration::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 36px;
      border: 2px solid transparent;
      background: linear-gradient(135deg, var(--primary-glow), transparent 60%, var(--primary-glow)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      animation: rotateBorder 6s linear infinite;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      letter-spacing: 0.5px;
    }

    .welcome-title .highlight {
      background: var(--gradient-5g);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-desc {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.7;
      max-width: 400px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 520px;
    }

    .suggestion-chip {
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition-fast);
      white-space: nowrap;
    }

    .suggestion-chip:hover {
      border-color: var(--border-focus);
      color: var(--primary-glow);
      background: rgba(0,229,255,0.06);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,229,255,0.1);
    }

    .suggestion-chip:active { transform: scale(0.96); }

    /* ═══════════════════════ MESSAGE BUBBLES ═══════════════════════ */
    .msg-wrapper {
      display: flex;
      gap: 10px;
      max-width: 76%;
      animation: msgSlideIn 0.3s var(--ease-smooth);
    }

    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-wrapper.bot { align-self: flex-start; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-top: 2px;
    }

    .msg-wrapper.user .msg-avatar {
      background: linear-gradient(135deg, #0096C7, #00B4D8);
      box-shadow: 0 0 10px rgba(0,180,216,0.3);
    }

    .msg-wrapper.bot .msg-avatar {
      background: var(--gradient-5g);
      box-shadow: 0 0 10px rgba(0,229,255,0.3);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg-wrapper.user .msg-bubble {
      background: linear-gradient(135deg, #0077B6, #00B4D8);
      color: #fff;
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: 0 2px 16px rgba(0,119,182,0.3);
    }

    .msg-wrapper.bot .msg-bubble {
      background: var(--bg-card);
      color: var(--text);
      border-bottom-left-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    /* Typing Indicator */
    .msg-wrapper.bot.thinking .msg-bubble {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      min-width: 60px;
    }

    .typing-signal {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
    }

    .typing-signal span {
      width: 3px;
      border-radius: 2px;
      background: var(--primary-glow);
      animation: signalBar 1s ease-in-out infinite;
      box-shadow: 0 0 4px var(--primary-glow);
    }

    .typing-signal span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .typing-signal span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
    .typing-signal span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
    .typing-signal span:nth-child(4) { height: 16px; animation-delay: 0.45s; }
    .typing-signal span:nth-child(5) { height: 12px; animation-delay: 0.6s; }

    @keyframes signalBar {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Error */
    .msg-wrapper.bot.error .msg-bubble {
      background: rgba(255,77,106,0.08);
      border-color: rgba(255,77,106,0.3);
      color: #FF6B81;
    }

    /* ═══════════════════════════ FLOATING INPUT AREA ═══════════════════════════ */
    #inputArea {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(860px, calc(100% - 40px));
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .input-shell {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(10, 22, 42, 0.65);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border: 1px solid rgba(0, 229, 255, 0.12);
      border-radius: 999px;
      padding: 6px 6px 6px 22px;
      transition: var(--transition);
      box-shadow:
        0 0 30px rgba(0, 229, 255, 0.06),
        0 8px 32px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    /* Gradient border overlay */
    .input-shell::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 999px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,229,255,0.2), transparent 40%, transparent 60%, rgba(0,119,182,0.15));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.6;
      transition: opacity var(--transition);
    }

    .input-shell:focus-within {
      border-color: rgba(0, 229, 255, 0.3);
      box-shadow:
        0 0 50px rgba(0, 229, 255, 0.12),
        0 0 20px rgba(0, 119, 182, 0.15),
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .input-shell:focus-within::before {
      opacity: 1;
      background: linear-gradient(135deg, rgba(0,229,255,0.35), transparent 40%, transparent 60%, rgba(0,119,182,0.3));
    }

    #input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      resize: none;
      min-height: 36px;
      max-height: 120px;
      line-height: 1.5;
      padding: 6px 0;
    }

    #input::placeholder {
      color: var(--text-muted);
      transition: color var(--transition-fast);
    }

    .input-shell:focus-within #input::placeholder {
      color: var(--text-secondary);
    }

    #sendBtn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--gradient-5g);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s var(--ease-smooth);
      box-shadow:
        0 0 16px rgba(0, 229, 255, 0.25),
        0 4px 12px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    /* Glow halo behind button */
    #sendBtn::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: var(--gradient-5g);
      opacity: 0;
      filter: blur(8px);
      transition: opacity 0.3s;
      z-index: -1;
    }

    #sendBtn:hover:not(:disabled) {
      transform: scale(1.12);
      box-shadow:
        0 0 24px rgba(0, 229, 255, 0.4),
        0 0 48px rgba(0, 119, 182, 0.2),
        0 4px 16px rgba(0, 0, 0, 0.3);
      filter: brightness(1.15);
    }

    #sendBtn:hover:not(:disabled)::before {
      opacity: 0.5;
    }

    #sendBtn:active:not(:disabled) {
      transform: scale(0.95);
    }

    #sendBtn:disabled {
      background: #1E3350;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      cursor: not-allowed;
      opacity: 0.5;
    }

    #sendBtn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s;
    }

    #sendBtn:hover:not(:disabled) svg {
      transform: translateX(1px) translateY(-1px);
    }

    /* ═══════════════════════ PARTICLE BURST ON SEND ═══════════════════════ */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      animation: particleBurst 0.7s ease-out forwards;
    }

    @keyframes particleBurst {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      60% { opacity: 0.5; }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }

    /* ═══════════════════════════ RESPONSIVE ═══════════════════════════ */
    @media (max-width: 640px) {
      #header { padding: 10px 16px; }
      #messages { padding: 16px 16px 90px; gap: 14px; }
      #inputArea { bottom: 14px; width: calc(100% - 28px); }
      .input-shell { padding-left: 16px; }
      .msg-wrapper { max-width: 88%; }
      .welcome-title { font-size: 20px; }
      .suggestions { gap: 6px; }
      .suggestion-chip { padding: 7px 14px; font-size: 12px; }
      .header-title .subtitle-tag { font-size: 9px; margin-left: 4px; padding: 1px 5px; }
    }

    @media (max-width: 380px) {
      .msg-wrapper { max-width: 92%; }
      #inputArea { bottom: 10px; width: calc(100% - 20px); }
    }

    /* ═══════════════════════ MAIN CARD (mainCard) ═══════════════════════ */
    .main-card-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .main-card {
      display: block;
      text-decoration: none;
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px 16px 22px;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--gradient-5g);
      border-radius: 0 2px 2px 0;
    }

    .main-card:hover {
      border-color: var(--border-focus);
      background: var(--bg-hover);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .main-card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--primary-glow);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .main-card-title::after {
      content: '\2192';
      font-size: 14px;
      opacity: 0.5;
      transition: var(--transition-fast);
    }

    .main-card:hover .main-card-title::after {
      opacity: 1;
      transform: translateX(4px);
    }

    .main-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .main-card-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .main-card-actions button {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid;
    }

    .btn-completed {
      background: rgba(0,229,160,0.1);
      border-color: rgba(0,229,160,0.3);
      color: var(--success);
    }

    .btn-completed:hover {
      background: rgba(0,229,160,0.2);
      box-shadow: 0 0 12px rgba(0,229,160,0.2);
    }

    .btn-completed:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-not-completed {
      background: rgba(255,167,38,0.1);
      border-color: rgba(255,167,38,0.3);
      color: #ffa726;
    }

    .btn-not-completed:hover {
      background: rgba(255,167,38,0.2);
      box-shadow: 0 0 12px rgba(255,167,38,0.2);
    }

    /* ═══════════════════════ QUIZ (sideCard) ═══════════════════════ */
    .quiz-container {
      margin-top: 14px;
    }

    .quiz-question {
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
      display: none;
    }

    .quiz-question.active {
      display: block;
      animation: fadeInUp 0.25s var(--ease-smooth);
    }

    .quiz-question-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .quiz-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid;
    }

    .quiz-badge.single {
      color: var(--primary-glow);
      border-color: rgba(0,229,255,0.3);
      background: rgba(0,229,255,0.08);
    }

    .quiz-badge.multiple {
      color: #ffa726;
      border-color: rgba(255,167,38,0.3);
      background: rgba(255,167,38,0.08);
    }

    .quiz-badge.judge {
      color: var(--success);
      border-color: rgba(0,229,160,0.3);
      background: rgba(0,229,160,0.08);
    }

    .quiz-question-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .quiz-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition-fast);
      font-size: 13px;
      color: var(--text-secondary);
      background: transparent;
    }

    .quiz-option:hover {
      border-color: rgba(0,229,255,0.3);
      background: rgba(0,229,255,0.04);
      color: var(--text);
    }

    .quiz-option.selected {
      border-color: var(--primary-glow);
      background: rgba(0,229,255,0.08);
      color: var(--text);
      box-shadow: 0 0 10px rgba(0,229,255,0.1);
    }

    .quiz-option .opt-marker {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      transition: var(--transition-fast);
    }

    .quiz-option.selected .opt-marker {
      border-color: var(--primary-glow);
      background: var(--primary-glow);
      color: var(--bg);
    }

    .quiz-option.correct {
      border-color: var(--success);
      background: rgba(0,229,160,0.08);
    }

    .quiz-option.correct .opt-marker {
      border-color: var(--success);
      background: var(--success);
      color: var(--bg);
    }

    .quiz-option.wrong {
      border-color: var(--error);
      background: rgba(255,77,106,0.08);
    }

    .quiz-option.wrong .opt-marker {
      border-color: var(--error);
      background: var(--error);
      color: #fff;
    }

    .quiz-option.disabled {
      pointer-events: none;
      opacity: 0.7;
    }

    .quiz-nav {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .quiz-nav button {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid;
    }

    .quiz-nav-btn {
      background: transparent;
      border-color: var(--border);
      color: var(--text-secondary);
    }

    .quiz-nav-btn:hover {
      border-color: var(--border-focus);
      color: var(--text);
      background: rgba(0,229,255,0.04);
    }

    .quiz-submit-btn {
      background: var(--gradient-5g);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 12px rgba(0,229,255,0.2);
    }

    .quiz-submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
    }

    .quiz-submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .quiz-result {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      animation: fadeInUp 0.3s var(--ease-smooth);
    }

    .quiz-result.correct {
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.3);
      color: var(--success);
    }

    .quiz-result.wrong {
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.3);
      color: var(--error);
    }

    /* ═══════════════════════ FIREWORKS CANVAS ═══════════════════════ */
    #fireworksCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      pointer-events: none;
      display: none;
    }

    .next-chapter-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 12px 28px;
      border: none;
      border-radius: 999px;
      background: var(--gradient-5g);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 0 16px rgba(0,229,255,0.25);
      animation: fadeInUp 0.4s var(--ease-smooth);
    }

    .next-chapter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(0,229,255,0.4);
    }

    .next-chapter-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>

  <!-- Fireworks Canvas -->
  <canvas id="fireworksCanvas"></canvas>

  <!-- 5G Network Background -->
  <div class="bg-network">
    <div class="signal-node"></div>
    <div class="signal-node"></div>
    <div class="signal-node"></div>
    <div class="signal-node"></div>
    <div class="signal-node"></div>
    <div class="signal-node"></div>
    <div class="signal-node"></div>
    <div class="signal-node"></div>
    <div class="signal-wave"></div>
    <div class="signal-wave"></div>
    <div class="signal-wave"></div>
  </div>

  <!-- Main App Container -->
  <div id="app-container">
    <!-- Header -->
    <header id="header">
      <div class="header-avatar">
        <img src="/assets/5g-avatar.png" alt="5G助手" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="avatar-fallback" style="display:none">5G</span>
      </div>
      <div class="header-info">
        <div class="header-title">
          5G智学助手<span class="subtitle-tag">2.2 初识5G通信</span>
        </div>
        <div class="header-subtitle">
          <span class="status-dot"></span> 5G知识引擎运行中
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" title="清空对话" onclick="clearChat()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </header>

    <!-- Messages Area -->
    <div id="messages"></div>

    <!-- Floating Input Area -->
    <div id="inputArea">
      <div class="input-shell">
        <textarea id="input" placeholder="输入你的5G问题，按 Enter 开始探索..." rows="1"></textarea>
        <button id="sendBtn" onclick="send()" title="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════ APP LOGIC ═══════════════════════════ */
    let msgKeyCounter = 1;

    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const messagesEl = document.getElementById('messages');

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 150) + 'px';
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function quickAsk(text) { input.value = text; send(); }

    function clearChat() {
      messagesEl.innerHTML = '';
      msgKeyCounter = 1;
      showWelcome();
      input.focus();
    }

    function showWelcome() {
      if (!document.getElementById('welcomeScreen')) {
        const ws = document.createElement('div');
        ws.className = 'welcome-screen';
        ws.id = 'welcomeScreen';
        ws.innerHTML = `
          <div class="welcome-illustration">
            <img src="/assets/5g-avatar.png" alt="5G助手" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="avatar-fallback" style="display:none;font-size:36px">5G</span>
          </div>
          <div class="welcome-title">你好，我是<span class="highlight">5G智学助手</span></div>
          <div class="welcome-desc">
            欢迎来到 <b>2.2 初识5G通信</b> 课程。我是你的专属5G知识助手，可以帮你解答5G技术原理、网络架构、应用场景等各类问题。试试问我吧～
          </div>
          <div class="suggestions">
            <div class="suggestion-chip" onclick="quickAsk('5G和4G有什么区别？请详细对比')">📶 5G vs 4G 区别</div>
            <div class="suggestion-chip" onclick="quickAsk('什么是5G的三大应用场景？eMBB、uRLLC、mMTC分别是什么')">🎯 5G三大应用场景</div>
            <div class="suggestion-chip" onclick="quickAsk('5G的核心技术有哪些？比如Massive MIMO、网络切片等')">🔬 5G核心技术</div>
            <div class="suggestion-chip" onclick="quickAsk('5G在日常生活中有什么应用？请举例说明')">📱 5G生活应用</div>
          </div>
        `;
        messagesEl.appendChild(ws);
      }
    }

    function hideWelcome() {
      const ws = document.getElementById('welcomeScreen');
      if (ws) ws.remove();
    }

    function createMessageWrapper(role) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? '我' : '5G';
      wrapper.appendChild(avatar);
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return { wrapper, bubble };
    }

    function burstParticles(x, y) {
      const colors = ['#00E5FF', '#00B4D8', '#0077B6', '#48CAE4', '#0096C7'];
      for (let i = 0; i < 10; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.4;
        const dist = 25 + Math.random() * 45;
        p.style.cssText = `
          left:${x}px; top:${y}px; width:5px; height:5px; border-radius:50%;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          --px:${Math.cos(angle)*dist}px; --py:${Math.sin(angle)*dist}px;
          box-shadow: 0 0 6px currentColor;
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
      }
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      hideWelcome();

      const btnRect = sendBtn.getBoundingClientRect();
      burstParticles(btnRect.left + btnRect.width / 2, btnRect.top + btnRect.height / 2);

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      const userMsg = createMessageWrapper('user');
      userMsg.bubble.textContent = text;

      const botMsg = createMessageWrapper('bot');
      botMsg.wrapper.classList.add('thinking');
      botMsg.bubble.innerHTML = '<div class="typing-signal"><span></span><span></span><span></span><span></span><span></span></div>';

      let fullText = '';
      let started = false;
      let outCompleteData = null;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text, msgKey: msgKeyCounter++ }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let currentEvent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (line.startsWith('event:')) {
              currentEvent = line.slice(6).trim();
              continue;
            }
            if (!line.startsWith('data:')) continue;
            if (currentEvent === 'ANSWER') {
              currentEvent = '';
              try {
                const json = JSON.parse(line.slice(5));
                const chunk = json?.text || '';
                if (chunk) {
                  if (!started) {
                    botMsg.wrapper.classList.remove('thinking');
                    botMsg.bubble.textContent = '';
                    started = true;
                  }
                  fullText += chunk;
                  botMsg.bubble.textContent = fullText;
                  scrollToBottom();
                }
              } catch {}
            } else if (currentEvent === 'OUT_COMPLETE') {
              currentEvent = '';
              try {
                const json = JSON.parse(line.slice(5));
                if (json && json.eventData) {
                  outCompleteData = json.eventData;
                }
              } catch {}
            } else {
              currentEvent = '';
            }
          }
        }

        // Process OUT_COMPLETE event data after stream ends
        if (outCompleteData) {
          handleOutComplete(outCompleteData, botMsg);
        }
      } catch (err) {
        botMsg.wrapper.classList.remove('thinking');
        botMsg.wrapper.classList.add('error');
        botMsg.bubble.innerHTML = '⚠️ 请求失败，请稍后重试';
        console.error('Chat error:', err);
      }

      if (!started && !botMsg.wrapper.classList.contains('error')) {
        botMsg.wrapper.classList.remove('thinking');
        botMsg.bubble.textContent = '（暂无回复）';
      }

      sendBtn.disabled = false;
      input.focus();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /* ═══════════════════ UTILITY ═══════════════════ */
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    /* ═══════════════════ OUT_COMPLETE HANDLER ═══════════════════ */
    function handleOutComplete(eventData, botMsg) {
      const { functionName, parameters } = eventData;
      if (!functionName) return;

      if (functionName === 'mainCard') {
        if (parameters) renderMainCard(parameters, botMsg.bubble);
      } else if (functionName === 'sideCard') {
        if (parameters) renderSideCard(parameters, botMsg.bubble);
      } else if (functionName === 'congrates') {
        renderFireworks();
        renderNextChapterButton(botMsg.bubble);
      }
      scrollToBottom();
    }

    /* ═══════════════════ mainCard — CLICKABLE CARDS ═══════════════════ */
    function renderMainCard(parameters, bubble) {
      const container = document.createElement('div');
      container.className = 'main-card-container';
      parameters.forEach(item => {
        const card = document.createElement('a');
        card.className = 'main-card';
        card.href = item.url || item.link || '#';
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.innerHTML =
          '<div class="main-card-title">' + escapeHtml(item.title || '') + '</div>' +
          '<div class="main-card-desc">' + escapeHtml(item.description || '') + '</div>';
        container.appendChild(card);
      });

      // Collect taskIds from parameters
      const taskIds = parameters.map(item => item.taskId).filter(Boolean);

      const actions = document.createElement('div');
      actions.className = 'main-card-actions';
      actions.innerHTML =
        '<button class="btn-not-completed" onclick="onMainCardNotCompleted()">\u672a\u5b8c\u6210</button>' +
        '<button class="btn-completed" data-taskids="' + escapeHtml(JSON.stringify(taskIds)) + '" onclick="onMainCardCompleted(this)">\u5df2\u5b8c\u6210</button>';
      container.appendChild(actions);

      bubble.appendChild(container);
    }

    function onMainCardNotCompleted() {
      alert('\u8bf7\u5b8c\u6210\u4e3b\u7ebf\u4efb\u52a1\u3002');
    }

    async function onMainCardCompleted(btn) {
      btn.disabled = true;
      btn.textContent = '\u63d0\u4ea4\u4e2d...';
      try {
        const taskIds = JSON.parse(btn.dataset.taskids || '[]');
        const skipSide = taskIds.some(id => id === 15 || id === 16 || id === 17);

        const patches = [
          { path: 'state.firstEntry', value: false },
          { path: 'state.nodeState.mainQuest.completed', value: true }
        ];
        if (skipSide) {
          patches.push({ path: 'state.nodeState.sideQuest.round', value: 3 });
        }
        if (taskIds.indexOf(17) !== -1) {
          patches.push({ path: 'state.allCompleted', value: true });
        }

        const res = await fetch('/api/userState/patch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userNid: '61tpO8lxdx', patches: patches }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        btn.textContent = '\u2713 \u5df2\u63d0\u4ea4';
        btn.style.pointerEvents = 'none';
        // Automatically send a chat message to trigger sideCard
        input.value = '\u5df2\u5b8c\u6210\u4e3b\u7ebf\u4efb\u52a1';
        send();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '\u5df2\u5b8c\u6210';
        alert('\u63d0\u4ea4\u5931\u8d25\uff0c\u8bf7\u91cd\u8bd5');
        console.error('userState patch error:', err);
      }
    }

    /* ═══════════════════ sideCard — INTERACTIVE QUIZ ═══════════════════ */
    function renderSideCard(parameters, bubble) {
      const questions = parameters.filter(p => p.question && p.options);
      if (questions.length === 0) return;
      const total = questions.length;

      const container = document.createElement('div');
      container.className = 'quiz-container';
      container.dataset.current = '0';
      container._questions = questions;

      questions.forEach((q, qIdx) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'quiz-question' + (qIdx === 0 ? ' active' : '');
        qDiv.dataset.answer = q.answer || '';
        qDiv.dataset.explanation = q.explanation || '';
        qDiv.dataset.type = q.type || 'single';
        qDiv.dataset.index = qIdx;

        const typeLabels = { single: '\u5355\u9009\u9898', multiple: '\u591a\u9009\u9898', judge: '\u5224\u65ad\u9898' };
        const typeLabel = typeLabels[q.type] || '\u9898\u76ee';
        const typeCls = q.type || 'single';

        let optHtml = '';
        (q.options || []).forEach(opt => {
          const key = opt.key || '';
          const text = opt.text || '';
          optHtml +=
            '<div class="quiz-option" data-value="' + escapeHtml(key) + '" onclick="toggleQuizOption(this)">' +
            '<span class="opt-marker">' + escapeHtml(key) + '</span>' +
            '<span>' + escapeHtml(text) + '</span>' +
            '</div>';
        });

        // Build nav buttons
        let navHtml = '<div class="quiz-nav">';
        if (qIdx > 0) {
          navHtml += '<button class="quiz-nav-btn" onclick="quizNav(this,-1)">\u4e0a\u4e00\u9898</button>';
        }
        if (qIdx < total - 1) {
          navHtml += '<button class="quiz-nav-btn" onclick="quizNav(this,1)">\u4e0b\u4e00\u9898</button>';
        }
        if (qIdx === total - 1) {
          navHtml += '<button class="quiz-submit-btn" onclick="submitAllQuiz(this)">\u63d0\u4ea4\u7b54\u6848</button>';
        }
        navHtml += '</div>';

        qDiv.innerHTML =
          '<div class="quiz-question-header">' +
          '<span class="quiz-badge ' + typeCls + '">' + typeLabel + '</span>' +
          '<span style="font-size:12px;color:var(--text-muted)">\u7b2c ' + (qIdx + 1) + ' / ' + total + ' \u9898</span>' +
          '</div>' +
          '<div class="quiz-question-text">' + escapeHtml(q.question || '') + '</div>' +
          '<div class="quiz-options">' + optHtml + '</div>' +
          navHtml;

        container.appendChild(qDiv);
      });

      bubble.appendChild(container);
    }

    function quizNav(btn, dir) {
      const container = btn.closest('.quiz-container');
      const current = parseInt(container.dataset.current);
      const next = current + dir;
      const questions = container.querySelectorAll('.quiz-question');
      if (next < 0 || next >= questions.length) return;
      questions[current].classList.remove('active');
      questions[next].classList.add('active');
      container.dataset.current = next;
      scrollToBottom();
    }

    function toggleQuizOption(el) {
      const question = el.closest('.quiz-question');
      if (question.classList.contains('answered')) return;

      const type = question.dataset.type;
      if (type === 'multiple') {
        el.classList.toggle('selected');
      } else {
        question.querySelectorAll('.quiz-option.selected').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
      }
    }

    async function submitAllQuiz(btn) {
      const container = btn.closest('.quiz-container');
      const questionEls = container.querySelectorAll('.quiz-question');
      const origQuestions = container._questions || [];
      btn.disabled = true;
      btn.textContent = '\u63d0\u4ea4\u4e2d...';

      // 1. Collect user answers and grade each question
      let correctCount = 0;
      const preResult = [];

      questionEls.forEach((question, idx) => {
        if (question.classList.contains('answered')) return;
        question.classList.add('answered');

        const correctAnswer = question.dataset.answer;
        const explanation = question.dataset.explanation;

        let userAnswer = '';
        question.querySelectorAll('.quiz-option.selected').forEach(el => {
          userAnswer += el.dataset.value;
        });

        const sortedUser = userAnswer.split('').sort().join('');
        const sortedCorrect = correctAnswer.split('').sort().join('');
        const isCorrect = sortedUser === sortedCorrect;
        if (isCorrect) correctCount++;

        question.querySelectorAll('.quiz-option').forEach(opt => {
          opt.classList.add('disabled');
          const val = opt.dataset.value;
          if (correctAnswer.includes(val)) opt.classList.add('correct');
          if (opt.classList.contains('selected') && !correctAnswer.includes(val)) opt.classList.add('wrong');
        });

        const result = document.createElement('div');
        result.className = 'quiz-result ' + (isCorrect ? 'correct' : 'wrong');
        let resultText = isCorrect
          ? '\u2713 \u56de\u7b54\u6b63\u786e\uff01'
          : '\u2717 \u56de\u7b54\u9519\u8bef\uff0c\u6b63\u786e\u7b54\u6848\u662f\uff1a' + correctAnswer;
        if (explanation) resultText += '\n\u89e3\u6790\uff1a' + explanation;
        result.textContent = resultText;
        result.style.whiteSpace = 'pre-wrap';
        question.querySelector('.quiz-options').after(result);

        // Build preResult entry from original question data
        const orig = origQuestions[idx] || {};
        preResult.push({
          id: orig.id || '',
          type: orig.type || '',
          question: orig.question || '',
          options: orig.options || [],
          answer: orig.answer || '',
          userAnswer: userAnswer,
          explanation: orig.explanation || '',
          knowledgePoint: orig.knowledgePoint || '',
        });
      });

      // Show first question with results
      questionEls.forEach(q => q.classList.remove('active'));
      questionEls[0].classList.add('active');
      container.dataset.current = '0';
      scrollToBottom();

      // 2. Query current state, build patches, call patch API
      try {
        const stateRes = await fetch('/api/userState?v4Code=u9QaKqc7qM&userNid=61tpO8lxdx');
        if (!stateRes.ok) throw new Error('query state failed');
        const stateData = await stateRes.json();
        const sideQuest = stateData.state.nodeState.sideQuest;

        const newRound = (sideQuest.round || 0) + 1;
        const newTotalResult = (sideQuest.totalResult || []).concat(preResult);
        const newScore = (sideQuest.score || 0) + correctCount * 10;

        await fetch('/api/userState/patch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userNid: '61tpO8lxdx',
            patches: [
              { path: 'state.nodeState.sideQuest.round', value: newRound },
              { path: 'state.nodeState.sideQuest.preResult', value: preResult },
              { path: 'state.nodeState.sideQuest.totalResult', value: newTotalResult },
              { path: 'state.nodeState.sideQuest.isAnswered', value: true },
              { path: 'state.nodeState.sideQuest.score', value: newScore },
            ],
          }),
        });
        btn.textContent = '\u2713 \u5df2\u63d0\u4ea4';
        // Automatically send a chat message after state update
        input.value = '\u5df2\u5b8c\u6210\u652f\u7ebf\u4efb\u52a1';
        send();
      } catch (err) {
        console.error('submitAllQuiz patch error:', err);
        btn.textContent = '\u63d0\u4ea4\u5931\u8d25';
      }
    }

    /* ═══════════════════ congrates — NEXT CHAPTER ═══════════════════ */
    function renderNextChapterButton(bubble) {
      const btn = document.createElement('button');
      btn.className = 'next-chapter-btn';
      btn.textContent = '\u8fdb\u5165\u4e0b\u4e00\u7ae0';
      btn.onclick = function() { onNextChapter(btn); };
      bubble.appendChild(btn);
    }

    async function onNextChapter(btn) {
      btn.disabled = true;
      btn.textContent = '\u8fdb\u5165\u4e2d...';
      try {
        const res = await fetch('/api/userState/delete?v4Code=u9QaKqc7qM&userNid=61tpO8lxdx', {
          method: 'POST',
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        btn.textContent = '\u2713 \u5df2\u8fdb\u5165\u4e0b\u4e00\u7ae0';
        btn.style.pointerEvents = 'none';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '\u8fdb\u5165\u4e0b\u4e00\u7ae0';
        alert('\u64cd\u4f5c\u5931\u8d25\uff0c\u8bf7\u91cd\u8bd5');
        console.error('nextChapter error:', err);
      }
    }

    /* ═══════════════════ congrates — FIREWORKS ═══════════════════ */
    function renderFireworks() {
      var canvas = document.getElementById('fireworksCanvas');
      var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.style.display = 'block';

      var particles = [];
      var rockets = [];
      var running = true;
      var startTime = Date.now();
      var duration = 5000;

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function Particle(x, y, hue) {
        this.x = x;
        this.y = y;
        this.hue = hue;
        this.brightness = random(50, 80);
        this.alpha = 1;
        var angle = random(0, Math.PI * 2);
        var speed = random(1, 6);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.decay = random(0.01, 0.03);
        this.gravity = 0.02;
      }

      Particle.prototype.update = function() {
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
      };

      Particle.prototype.draw = function() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + this.hue + ', 100%, ' + this.brightness + '%, ' + this.alpha + ')';
        ctx.fill();
      };

      function Rocket(x) {
        this.x = x;
        this.y = canvas.height;
        this.targetY = random(canvas.height * 0.1, canvas.height * 0.4);
        this.vy = -random(8, 12);
        this.hue = random(0, 360);
        this.alpha = 1;
        this.exploded = false;
        this.trail = [];
      }

      Rocket.prototype.update = function() {
        this.trail.push({ x: this.x, y: this.y, alpha: 1 });
        if (this.trail.length > 8) this.trail.shift();
        this.trail.forEach(function(t) { t.alpha -= 0.12; });
        this.vy += 0.08;
        this.y += this.vy;
        if (this.vy >= 0 || this.y <= this.targetY) {
          this.exploded = true;
          var count = Math.floor(random(50, 90));
          for (var i = 0; i < count; i++) {
            particles.push(new Particle(this.x, this.y, this.hue));
          }
        }
      };

      Rocket.prototype.draw = function() {
        this.trail.forEach(function(t) {
          if (t.alpha > 0) {
            ctx.beginPath();
            ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = 'hsla(40, 100%, 80%, ' + t.alpha + ')';
            ctx.fill();
          }
        });
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'hsl(40, 100%, 90%)';
        ctx.fill();
      };

      function animate() {
        if (!running) return;
        requestAnimationFrame(animate);

        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'lighter';

        var elapsed = Date.now() - startTime;

        if (elapsed < duration && Math.random() < 0.06) {
          rockets.push(new Rocket(random(canvas.width * 0.1, canvas.width * 0.9)));
        }

        for (var r = rockets.length - 1; r >= 0; r--) {
          rockets[r].update();
          if (!rockets[r].exploded) {
            rockets[r].draw();
          } else {
            rockets.splice(r, 1);
          }
        }

        for (var p = particles.length - 1; p >= 0; p--) {
          particles[p].update();
          if (particles[p].alpha > 0) {
            particles[p].draw();
          } else {
            particles.splice(p, 1);
          }
        }

        if (elapsed > duration && rockets.length === 0 && particles.length === 0) {
          running = false;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          canvas.style.display = 'none';
        }
      }

      animate();
    }

    // Initialize welcome screen on page load
    showWelcome();
  </script>
